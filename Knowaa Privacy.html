  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F2F2F2; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #0A0A0A;
      overflow-x: hidden;
    }
    img, svg, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
    ::selection { background: #4A0FB8; color: #fff; }

    :root {
      --knowaa-purple: #4A0FB8;
      --spark-magenta: #FF2D87;
      --spark-orange: #FF7A29;
      --ink: #0D0959;
      --title: #0D0959;
      --ink-70: rgba(10,10,10,0.7);
      --ink-50: rgba(10,10,10,0.5);
      --ink-30: rgba(10,10,10,0.3);
      --ink-15: rgba(10,10,10,0.12);
      --ink-08: rgba(10,10,10,0.08);
      --page-gutter: clamp(15px, 2.78vw, 41px);
    }

    @media (max-width: 768px) {
      :root { --page-gutter: 0px; }
    }

    /* ══════════════════════════════════════════
       TERMS PAGE LAYOUT
       ══════════════════════════════════════════ */

    .terms {
      padding: 96px clamp(24px, 6vw, 88px) 120px;
      max-width: 820px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .terms {
        padding: 64px 24px 80px;
      }
    }

    /* Main column */
    .terms__main { min-width: 0; }

    .terms__h1 {
      font-size: clamp(40px, 5.2vw, 68px);
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.02;
      color: var(--ink);
      margin: 0 0 28px;
    }

    .terms__lede {
      font-size: clamp(17px, 1.35vw, 20px);
      line-height: 1.55;
      color: var(--ink-70);
      margin: 0 0 28px;
      max-width: 640px;
    }
    .terms__lede:last-of-type {
      padding-bottom: 32px;
      border-bottom: 1px solid var(--ink-15);
      margin-bottom: 32px;
    }
    .terms__lede--secondary {
      font-size: clamp(15px, 1.1vw, 17px);
      color: var(--ink-50);
    }

    .terms__meta {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--ink-50);
      text-transform: uppercase;
      margin: 0 0 36px;
    }

    .terms__callout {
      background: #F5F5F5;
      border: 1px solid #EAEAEA;
      border-left: 3px solid var(--knowaa-purple);
      border-radius: 8px;
      padding: 18px 22px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-70);
      margin: 0 0 56px;
    }

    .terms__section + .terms__section { margin-top: 48px; }

    .terms__h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--ink);
      margin: 0 0 14px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .terms__h2-num {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-30);
      letter-spacing: 0.04em;
      flex-shrink: 0;
      min-width: 28px;
    }

    .terms__p {
      font-size: 16px;
      line-height: 1.65;
      color: var(--ink-70);
      margin: 0 0 12px;
      max-width: 680px;
    }
    .terms__p:last-child { margin-bottom: 0; }

    .terms__h3 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 24px 0 10px;
    }

    .terms__ul {
      margin: 0 0 14px;
      padding-left: 22px;
      color: var(--ink-70);
      font-size: 16px;
      line-height: 1.6;
      max-width: 680px;
    }
    .terms__ul li { margin-bottom: 6px; }
    .terms__ul a {
      color: var(--knowaa-purple);
      border-bottom: 1px solid rgba(74,15,184,0.3);
    }

    .terms__table {
      width: 100%;
      max-width: 760px;
      border-collapse: collapse;
      margin: 16px 0 18px;
      font-size: 14.5px;
    }
    .terms__table th,
    .terms__table td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--ink-15);
      vertical-align: top;
      color: var(--ink-70);
      line-height: 1.55;
    }
    .terms__table th {
      font-weight: 700;
      color: var(--ink);
      background: #F7F7F9;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .terms__p a {
      color: var(--knowaa-purple);
      border-bottom: 1px solid rgba(74,15,184,0.3);
      transition: border-color 0.15s ease;
    }
    .terms__p a:hover { border-bottom-color: var(--knowaa-purple); }

    /* Contact callout, only at the very bottom */
    .terms__contact {
      margin-top: 72px;
      padding: 28px 32px;
      background: #F5F5F5;
      border: 1px solid #EAEAEA;
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .terms__contact-text {
      font-size: 15px;
      color: var(--ink-70);
      line-height: 1.5;
      margin: 0;
    }
    .terms__contact-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      padding: 10px 18px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .terms__contact-cta:hover {
      background: var(--ink);
      color: #FFFFFF;
    }
  
    /* Global title color, applied to major headings site-wide.
       Hero (white on dark photo) is intentionally excluded. */
    .who-we-are__title,
    .kw-faq-title,
    .kw-approach__title,
    .kw-approach__rowTitle,
    .capabilities__heading,
    .rc__h1,
    .rc__hero-feature-title,
    .rc-min__title,
    .rc-min__feat-title,
    .rc-mag__cover-headline,
    .rc-mag__cover-feature-title,
    .rc-mag__rest-title,
    .terms__h1,
    .terms__h2,
    .article__title,
    .article__h2 {

    }

  <!-- Custom event tracking: CTA clicks + scroll depth -->
  <script>
    if (window.__ANALYTICS_ENABLED__) (function () {
      function ready(fn){document.readyState!=='loading'?fn():document.addEventListener('DOMContentLoaded',fn);}
      ready(function () {
        // --- CTA click tracking -------------------------------------------------
        // Tracks any <a> or <button> whose text contains a CTA-like phrase,
        // or any element with data-cta="<label>".
        var ctaWords = /talk to us|book|demo|contact|get started|let'?s talk|work with us|schedule/i;
        document.body.addEventListener('click', function (e) {
          var el = e.target.closest('a, button, [data-cta]');
          if (!el) return;
          var label = el.getAttribute('data-cta') || (el.textContent || '').trim().slice(0,80);
          var href  = el.getAttribute('href') || null;
          var isCta = el.hasAttribute('data-cta') || ctaWords.test(label);
          if (!isCta && !href) return;
          var evt = isCta ? 'cta_click' : (href && /^https?:/i.test(href) && !href.includes(location.hostname) ? 'outbound_click' : null);
          if (!evt) return;
          if (window.posthog && posthog.capture) {
            posthog.capture(evt, { label: label, href: href, page: location.pathname });
          }
        }, { passive: true });

        // --- Scroll depth (25 / 50 / 75 / 100%) ---------------------------------
        var hit = {};
        function onScroll() {
          var h = document.documentElement;
          var pct = Math.round(((h.scrollTop + window.innerHeight) / h.scrollHeight) * 100);
          [25,50,75,100].forEach(function (m) {
            if (pct >= m && !hit[m]) {
              hit[m] = true;
              if (window.posthog && posthog.capture) {
                posthog.capture('scroll_depth', { percent: m, page: location.pathname });
              }
            }
          });
        }
        window.addEventListener('scroll', onScroll, { passive: true });

        // --- Engaged read (>30s on page) ----------------------------------------
        setTimeout(function () {
          if (window.posthog && posthog.capture) {
            posthog.capture('engaged_read', { page: location.pathname, seconds: 30 });
          }
        }, 30000);
      });
    })();
  </script>
