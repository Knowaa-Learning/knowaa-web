<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F2F2F2; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #0A0A0A;
      overflow-x: hidden;
    }
    img, svg, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
    ::selection { background: #4A0FB8; color: #fff; }

    :root {
      --knowaa-purple: #4A0FB8;
      --spark-magenta: #FF2D87;
      --spark-orange: #FF7A29;
      --ink: #0D0959;
      --title: #0D0959;
      --ink-70: rgba(10,10,10,0.7);
      --ink-50: rgba(10,10,10,0.5);
      --ink-30: rgba(10,10,10,0.3);
      --ink-15: rgba(10,10,10,0.12);
      --ink-08: rgba(10,10,10,0.08);
      --page-gutter: clamp(15px, 2.78vw, 41px);
    }

    @media (max-width: 768px) {
      :root { --page-gutter: 0px; }
    }

    /* ══════════════════════════════════════════
       TERMS PAGE LAYOUT
       ══════════════════════════════════════════ */

    .terms {
      padding: 96px clamp(24px, 6vw, 88px) 120px;
      max-width: 820px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .terms {
        padding: 64px 24px 80px;
      }
    }

    /* Main column */
    .terms__main { min-width: 0; }

    .terms__h1 {
      font-size: clamp(40px, 5.2vw, 68px);
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.02;
      color: var(--ink);
      margin: 0 0 28px;
    }

    .terms__lede {
      font-size: clamp(17px, 1.35vw, 20px);
      line-height: 1.55;
      color: var(--ink-70);
      margin: 0 0 56px;
      max-width: 640px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--ink-15);
    }

    .terms__section + .terms__section { margin-top: 48px; }

    .terms__h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: var(--ink);
      margin: 0 0 14px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .terms__h2-num {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-30);
      letter-spacing: 0.04em;
      flex-shrink: 0;
      min-width: 28px;
    }

    .terms__p {
      font-size: 16px;
      line-height: 1.65;
      color: var(--ink-70);
      margin: 0 0 12px;
      max-width: 680px;
    }
    .terms__p:last-child { margin-bottom: 0; }

    .terms__p a {
      color: var(--knowaa-purple);
      border-bottom: 1px solid rgba(74,15,184,0.3);
      transition: border-color 0.15s ease;
    }
    .terms__p a:hover { border-bottom-color: var(--knowaa-purple); }

    /* Contact callout — only at the very bottom */
    .terms__contact {
      margin-top: 72px;
      padding: 28px 32px;
      background: #F5F5F5;
      border: 1px solid #EAEAEA;
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .terms__contact-text {
      font-size: 15px;
      color: var(--ink-70);
      line-height: 1.5;
      margin: 0;
    }
    .terms__contact-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      padding: 10px 18px;
      border: 1px solid var(--ink);
      border-radius: 999px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .terms__contact-cta:hover {
      background: var(--ink);
      color: #FFFFFF;
    }
  
    /* Global title color — applied to major headings site-wide.
       Hero (white on dark photo) is intentionally excluded. */
    .who-we-are__title,
    .kw-faq-title,
    .kw-approach__title,
    .kw-approach__rowTitle,
    .capabilities__heading,
    .rc__h1,
    .rc__hero-feature-title,
    .rc-min__title,
    .rc-min__feat-title,
    .rc-mag__cover-headline,
    .rc-mag__cover-feature-title,
    .rc-mag__rest-title,
    .terms__h1,
    .terms__h2,
    .article__title,
    .article__h2 {
      color: var(--title);
    }
  </style>
</head>
<body>
  <div id="root" style="max-width: 1680px; margin: 0 auto; padding: 0 var(--page-gutter); background: transparent;"></div>
  <style>
    #root { position: relative; }
    #root::before {
      content: ""; position: absolute; inset: 0 var(--page-gutter);
      background: #FFFFFF; z-index: 0; pointer-events: none;
    }
    #root > *:not(header) { background: #FFFFFF; position: relative; }
    #root > header { background: transparent !important; }
  </style>

  <noscript>
    <div style="max-width:680px;margin:80px auto;padding:40px 24px;font-family:system-ui,-apple-system,sans-serif;color:#0A0A0A;">
      <h1 style="font-size:28px;margin:0 0 16px;font-weight:700;">Terms of Use</h1>
      <p style="font-size:16px;line-height:1.6;color:#555;">
        This page requires JavaScript to load the full site shell. For questions about these terms,
        contact us at <a href="mailto:hello@knowaa.com" style="color:#4A0FB8;">hello@knowaa.com</a>.
      </p>
    </div>
  </noscript>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/footer.jsx"></script>
  <script type="text/babel" src="src/terms.jsx"></script>

  <script type="text/babel">
    function TermsApp() {
      return (
        <>
          <window.Nav solid />
          <window.Terms />
          <window.Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<TermsApp />);
  </script>
</body>
</html>
