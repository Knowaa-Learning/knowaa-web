  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F2F2F2; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #0A0A0A;
      overflow-x: hidden;
    }
    img, svg, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
    ::selection { background: #4A0FB8; color: #fff; }

    :root {
      --knowaa-purple: #4A0FB8;
      --spark-orange: #FF7A29;
      --ink: #0D0959;
      --title: #0D0959;
      --page-gutter: clamp(15px, 2.78vw, 41px);
    }

    @media (max-width: 768px) {
      :root { --page-gutter: 0px; }
    }
  
    /* Global title color — applied to major headings site-wide.
       Hero (white on dark photo) is intentionally excluded. */
    .who-we-are__title,
    .kw-faq-title,
    .kw-approach__title,
    .kw-approach__rowTitle,
    .capabilities__heading,
    .rc__h1,
    .rc__hero-feature-title,
    .rc-min__title,
    .rc-min__feat-title,
    .rc-mag__cover-headline,
    .rc-mag__cover-feature-title,
    .rc-mag__rest-title,
    .terms__h1,
    .terms__h2,
    .article__title,
    .article__h2 {
      color: var(--title);
    }
  </style>

<body>
  <div id="root" style="max-width: 1680px; margin: 0 auto; padding: 0 var(--page-gutter); background: transparent;"></div>

  <noscript>
    <div style="max-width:680px;margin:80px auto;padding:40px 24px;font-family:system-ui,-apple-system,sans-serif;color:#0A0A0A;text-align:center;">

      <p style="font-size:17px;line-height:1.5;color:#555;">
        Articles, case studies, and field notes from the Knowaa studio.
        This page requires JavaScript to load.
      </p>
    </div>
  </noscript>
  <style>
    #root { position: relative; }
    #root::before {
      content: ""; position: absolute; inset: 0 var(--page-gutter);
      background: #FFFFFF; z-index: 0; pointer-events: none;
    }
    #root > *:not(header) { background: #FFFFFF; position: relative; }
    #root > header { background: transparent !important; }
    /* The ResourcesEditorial root spans full-width and handles its own internal backgrounds.
       Its purple masthead bleeds edge-to-edge exactly like the homepage's Capabilities. */
    #root > .rc { background: transparent; }
    #root > .rc > .rc__masthead { background: #503594 !important; }
  </style>

  <script type="text/babel" src="src/resources-editorial.jsx?v=5"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          <window.Nav solid pinned />
          <window.ResourcesEditorial />
          <window.Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
