  <!-- Custom event tracking: CTA clicks + scroll depth -->
  <script>
    if (window.__ANALYTICS_ENABLED__) (function () {
      function ready(fn){document.readyState!=='loading'?fn():document.addEventListener('DOMContentLoaded',fn);}
      ready(function () {
        // --- CTA click tracking -------------------------------------------------
        // Tracks any <a> or <button> whose text contains a CTA-like phrase,
        // or any element with data-cta="<label>".
        var ctaWords = /talk to us|book|demo|contact|get started|let'?s talk|work with us|schedule/i;
        document.body.addEventListener('click', function (e) {
          var el = e.target.closest('a, button, [data-cta]');
          if (!el) return;
          var label = el.getAttribute('data-cta') || (el.textContent || '').trim().slice(0,80);
          var href  = el.getAttribute('href') || null;
          var isCta = el.hasAttribute('data-cta') || ctaWords.test(label);
          if (!isCta && !href) return;
          var evt = isCta ? 'cta_click' : (href && /^https?:/i.test(href) && !href.includes(location.hostname) ? 'outbound_click' : null);
          if (!evt) return;
          if (window.posthog && posthog.capture) {
            posthog.capture(evt, { label: label, href: href, page: location.pathname });
          }
        }, { passive: true });

        // --- Scroll depth (25 / 50 / 75 / 100%) ---------------------------------
        var hit = {};
        function onScroll() {
          var h = document.documentElement;
          var pct = Math.round(((h.scrollTop + window.innerHeight) / h.scrollHeight) * 100);
          [25,50,75,100].forEach(function (m) {
            if (pct >= m && !hit[m]) {
              hit[m] = true;
              if (window.posthog && posthog.capture) {
                posthog.capture('scroll_depth', { percent: m, page: location.pathname });
              }
            }
          });
        }
        window.addEventListener('scroll', onScroll, { passive: true });

        // --- Engaged read (>30s on page) ----------------------------------------
        setTimeout(function () {
          if (window.posthog && posthog.capture) {
            posthog.capture('engaged_read', { page: location.pathname, seconds: 30 });
          }
        }, 30000);
      });
    })();
  </script>
