    /* =========================================================
       MOBILE OVERRIDES, applied below 768px only.
       Desktop CSS paths above are untouched.
       ========================================================= */
    @media (max-width: 768px) {
      :root {
        --page-gutter: 0px;
      }
      html, body { overflow-x: hidden; }
      /* Ensure interactive controls meet 44px tap target minimum. */
      button, a { -webkit-tap-highlight-color: transparent; }

    @media (max-width: 900px) {

        line-height: 1.08 !important;

      }
      /* Proof marquee, shrink whole strip on mobile via zoom (affects layout, not transforms). */

        gap: 44px !important;
        zoom: 0.7;
      }

  <!-- Custom event tracking: CTA clicks + scroll depth -->
  <script>
    if (window.__ANALYTICS_ENABLED__) (function () {
      function ready(fn){document.readyState!=='loading'?fn():document.addEventListener('DOMContentLoaded',fn);}
      ready(function () {
        // --- CTA click tracking -------------------------------------------------
        // Tracks any <a> or <button> whose text contains a CTA-like phrase,
        // or any element with data-cta="<label>".
        var ctaWords = /talk to us|book|demo|contact|get started|let'?s talk|work with us|schedule/i;
        document.body.addEventListener('click', function (e) {
          var el = e.target.closest('a, button, [data-cta]');
          if (!el) return;
          var label = el.getAttribute('data-cta') || (el.textContent || '').trim().slice(0,80);
          var href  = el.getAttribute('href') || null;
          var isCta = el.hasAttribute('data-cta') || ctaWords.test(label);
          if (!isCta && !href) return;
          var evt = isCta ? 'cta_click' : (href && /^https?:/i.test(href) && !href.includes(location.hostname) ? 'outbound_click' : null);
          if (!evt) return;
          if (window.posthog && posthog.capture) {
            posthog.capture(evt, { label: label, href: href, page: location.pathname });
          }
        }, { passive: true });

        // --- Scroll depth (25 / 50 / 75 / 100%) ---------------------------------
        var hit = {};
        function onScroll() {
          var h = document.documentElement;
          var pct = Math.round(((h.scrollTop + window.innerHeight) / h.scrollHeight) * 100);
          [25,50,75,100].forEach(function (m) {
            if (pct >= m && !hit[m]) {
              hit[m] = true;
              if (window.posthog && posthog.capture) {
                posthog.capture('scroll_depth', { percent: m, page: location.pathname });
              }
            }
          });
        }
        window.addEventListener('scroll', onScroll, { passive: true });

        // --- Engaged read (>30s on page) ----------------------------------------
        setTimeout(function () {
          if (window.posthog && posthog.capture) {
            posthog.capture('engaged_read', { page: location.pathname, seconds: 30 });
          }
        }, 30000);
      });
    })();
  </script>

  <div id="root" style="max-width: 1680px; margin: 0 auto; padding: 0 var(--page-gutter); background: transparent;"></div>
  <style>
    /* Inner page canvas, white surface with grey gutters left/right only.
       Every direct child of #root paints white by default so clip-paths on
       sibling sections (e.g. Capabilities) never reveal the grey body.
       Sections that need a different background (like the purple Capabilities)
       override this via their own class selector with higher specificity.
       The ::before pseudo-element on #root paints white behind the entire
       content column so clip-cut regions never reveal the grey body through
       negative-margin overlaps. */
    #root { position: relative; }
    #root::before {
      content: "";
      position: absolute;
      inset: 0 var(--page-gutter);
      background: #FFFFFF;
      z-index: 0;
      pointer-events: none;
    }
    #root > *:not(header) { background: #FFFFFF; position: relative; }
    #root > header { background: transparent !important; }
    #root > .capabilities,
    #root > section.capabilities { background: #503594; }
    #root > .kw-testimonials,
    #root > section.kw-testimonials { background: linear-gradient(90deg, #503594 0%, #503594 40%, #7C5BE0 80%, #9B7BF0 100%); }
    #root > .insights,
    #root > section.insights { background: #F4F2FA; }
    #root > .kwfooter,
    #root > footer.kwfooter { background: #FAFAFF; margin-top: 24px; }
    /* Lavender "seam" between Capabilities (purple, clipped bottom oval) and
       Insights (lavender). The seam sits BEHIND capabilities (z:1, lower than
       capabilities' z:5) so capabilities' purple paints on top of it where
       present, but where the clip-path removes capabilities' paint (the
       bottom-corner ears), the seam shows through as lavender instead of the
       #root::before white. */
    #root > .kw-cap-seam {
      height: 240px;
      margin-top: -240px;
      background: #F4F2FA;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }
  </style>
