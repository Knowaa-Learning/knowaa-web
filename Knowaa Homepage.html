  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F2F2F2; }
    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F2F2F2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

      overflow-x: hidden;
    }
    img, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
    ::selection { background: #4A0FB8; color: #fff; }

    :root {
      --knowaa-purple: #4A0FB8;
      --spark-magenta: #FF2D87;
      --spark-orange: #FF7A29;
      --spark-violet: #9B3DFF;
      --ink: #0D0959;
      --ink-70: rgba(10,10,10,0.7);
      --ink-50: rgba(10,10,10,0.5);
      --ink-15: rgba(10,10,10,0.12);
      --title: #0D0959;
      --bg: #FFFFFF;
      --bg-cream: #F6F2EA;
      --page-gutter: clamp(15px, 2.78vw, 41px);
    }

    /* Global title color — applied to major headings site-wide.
       Uses a high-specificity compound selector to override component-scoped styles.
       Hero (white on dark photo) is intentionally excluded. */
    .who-we-are__title,
    .kw-faq-title,
    .kw-approach__title,
    .kw-approach__rowTitle,
    .capabilities__heading,
    .rc__h1,
    .rc__hero-feature-title,
    .rc-min__title,
    .rc-min__feat-title,
    .rc-mag__cover-headline,
    .rc-mag__cover-feature-title,
    .rc-mag__rest-title,
    .terms__h1,
    .terms__h2 {
      color: var(--title);
    }

    /* =========================================================
       MOBILE OVERRIDES — applied below 768px only.
       Desktop CSS paths above are untouched.
       ========================================================= */
    @media (max-width: 768px) {
      :root {
        --page-gutter: 0px;
      }
      html, body { overflow-x: hidden; }
      /* Ensure interactive controls meet 44px tap target minimum. */
      button, a { -webkit-tap-highlight-color: transparent; }
    }

    /* Nav — switch to hamburger at 900px so the links don't get crammed. */
    @media (max-width: 900px) {
      .nav-links-desktop { display: none !important; }
      .nav-hamburger { display: inline-flex !important; }
      .nav-bar-inner {
        grid-template-columns: 1fr auto !important;
        padding: 14px 20px !important;
        gap: 16px !important;
      }
      .nav-logo { height: 32px !important; }
    }

    /* Hero — tighter vertical, allow headline to wrap, smaller type */
    @media (max-width: 768px) {
      .hero-video-well {
        height: 78vh !important;
        min-height: 540px !important;
        max-height: 720px !important;
      }
      .hero-h1 {
        font-size: 32px !important;
        line-height: 1.08 !important;
      }
      .hero-h1-line1 {
        white-space: normal !important;
      }
      /* Proof marquee — shrink whole strip on mobile via zoom (affects layout, not transforms). */
      .proof-row {
        gap: 44px !important;
        zoom: 0.7;
      }
    }
  </style>
</head>
<body>
  <div id="root" style="max-width: 1680px; margin: 0 auto; padding: 0 var(--page-gutter); background: transparent;"></div>
  <style>
    /* Inner page canvas — white surface with grey gutters left/right only.
       Every direct child of #root paints white by default so clip-paths on
       sibling sections (e.g. Capabilities) never reveal the grey body.
       Sections that need a different background (like the purple Capabilities)
       override this via their own class selector with higher specificity.
       The ::before pseudo-element on #root paints white behind the entire
       content column so clip-cut regions never reveal the grey body through
       negative-margin overlaps. */
    #root { position: relative; }
    #root::before {
      content: "";
      position: absolute;
      inset: 0 var(--page-gutter);
      background: #FFFFFF;
      z-index: 0;
      pointer-events: none;
    }
    #root > *:not(header) { background: #FFFFFF; position: relative; }
    #root > header { background: transparent !important; }
    #root > .capabilities,
    #root > section.capabilities { background: #503594; }
    #root > .kw-testimonials,
    #root > section.kw-testimonials { background: linear-gradient(90deg, #503594 0%, #503594 40%, #7C5BE0 80%, #9B7BF0 100%); }
    #root > .insights,
    #root > section.insights { background: #F4F2FA; }
    #root > .kwfooter,
    #root > footer.kwfooter { background: #FAFAFF; margin-top: 24px; }
    /* Lavender "seam" between Capabilities (purple, clipped bottom oval) and
       Insights (lavender). The seam sits BEHIND capabilities (z:1, lower than
       capabilities' z:5) so capabilities' purple paints on top of it where
       present, but where the clip-path removes capabilities' paint (the
       bottom-corner ears), the seam shows through as lavender instead of the
       #root::before white. */
    #root > .kw-cap-seam {
      height: 240px;
      margin-top: -240px;
      background: #F4F2FA;
      position: relative;
      z-index: 1;
      pointer-events: none;
    }
  </style>
