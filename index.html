<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knowaa — Learning Performance Partner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #F2F2F2; }
    body {
      font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F2F2F2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #0A0A0A;
      overflow-x: hidden;
    }
    img, video { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
    ::selection { background: #4A0FB8; color: #fff; }

    :root {
      --knowaa-purple: #4A0FB8;
      --spark-magenta: #FF2D87;
      --spark-orange: #FF7A29;
      --spark-violet: #9B3DFF;
      --ink: #0A0A0A;
      --ink-70: rgba(10,10,10,0.7);
      --ink-50: rgba(10,10,10,0.5);
      --ink-15: rgba(10,10,10,0.12);
      --bg: #FFFFFF;
      --bg-cream: #F6F2EA;
      --page-gutter: clamp(15px, 2.78vw, 41px);
    }
  </style>
</head>
<body>
  <div id="root" style="max-width: 1680px; margin: 0 auto; padding: 0 var(--page-gutter); background: transparent;"></div>
  <style>
    /* Inner page canvas — white surface with grey gutters left/right only.
       Every direct child of #root paints white by default so clip-paths on
       sibling sections (e.g. Capabilities) never reveal the grey body.
       Sections that need a different background (like the purple Capabilities)
       override this via their own class selector with higher specificity.
       The ::before pseudo-element on #root paints white behind the entire
       content column so clip-cut regions never reveal the grey body through
       negative-margin overlaps. */
    #root { position: relative; }
    #root::before {
      content: "";
      position: absolute;
      inset: 0 var(--page-gutter);
      background: #FFFFFF;
      z-index: 0;
      pointer-events: none;
    }
    #root > * { background: #FFFFFF; position: relative; }
    #root > .capabilities,
    #root > section.capabilities { background: #503594; }
    #root > .kw-testimonials,
    #root > section.kw-testimonials { background: #503594; }
  </style>

  <script id="tweaks-config">
    window.TWEAKS = /*EDITMODE-BEGIN*/{
      "heroHeadline": "Complex knowledge, measurable capability.",
      "heroSub": "Knowaa is a learning performance partner. We design and produce custom learning experiences for enterprise — engineered for the capability shift you came in to achieve.",
      "heroCTA": "Start a project",
      "heroCTA2": "Watch showreel"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/nav.jsx"></script>
  <script type="text/babel" src="src/hero.jsx"></script>
  <script type="text/babel" src="src/proof.jsx"></script>
  <script type="text/babel" src="src/who-we-are.jsx"></script>
  <script type="text/babel" src="src/capabilities.jsx"></script>
  <script type="text/babel" src="src/insight.jsx"></script>
  <script type="text/babel" src="src/faq.jsx"></script>
  <script type="text/babel" src="src/testimonials.jsx"></script>
  <script type="text/babel" src="src/footer.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
